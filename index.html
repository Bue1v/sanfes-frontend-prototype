<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SANFES Frontend Mock</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/home" data-link>
      <span class="brand-mark">S</span>
      <span>
        <strong>SANFES 公式ポータル</strong>
        <small>SANFES 2026 / FRONTEND MOCK</small>
      </span>
    </a>

    <button class="nav-toggle" type="button" aria-label="メニュー" data-action="toggle-nav">
      <span></span><span></span><span></span>
    </button>

    <nav class="main-nav" id="mainNav" aria-label="main navigation">
      <a href="#/home" data-link data-nav="home">ホーム</a>
      <a href="#/schedule" data-link data-nav="schedule">スケジュール</a>
      <a href="#/competitions" data-link data-nav="competitions">競技ガイド</a>
      <a href="#/announcements" data-link data-nav="announcements">お知らせ</a>
      <a href="#/documents" data-link data-nav="documents">資料</a>
      <a href="#/song" data-link data-nav="song">フィナーレソング</a>
      <a href="#/help" data-link data-nav="help" data-auth="student">HELP募集</a>
      <a href="#/my" data-link data-nav="my" data-role="student">マイページ</a>
      <a href="#/staff" data-link data-nav="staff" data-role="staff">委員業務</a>
      <a href="#/admin" data-link data-nav="admin" data-role="admin">管理</a>
    </nav>

    <div class="account-box">
      <label for="accountSelect">表示</label>
      <select id="accountSelect" data-action="switch-account">
        <option value="guest">未ログイン</option>
        <option value="student">山田太郎 / 集計委員</option>
        <option value="sato">佐藤花子 / 招集誘導委員</option>
        <option value="murata">村田健 / 競技審判</option>
        <option value="ogawa">小川美咲 / 救護委員</option>
        <option value="unassigned">田中葵 / 未割当</option>
        <option value="admin">学校側管理者</option>
      </select>
    </div>
  </header>

  <main id="app" class="app-shell" tabindex="-1"></main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <footer class="footer">
    <span>SANFES 公式ポータル mock</span>
    <span>Static frontend only</span>
  </footer>

  <script src="./app.js"></script>
</body>
</html>
